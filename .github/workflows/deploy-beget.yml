# Деплой статического билда на Beget по SSH (rsync).
#
# Секреты в GitHub (в репо не коммитить): Settings → Secrets → Actions
#   REMOTE_HOST, REMOTE_USER, REMOTE_PATH, REMOTE_PRIVATE_KEY
#   REMOTE_PATH — полный абсолютный путь к public_html (из панели Beget), без кавычек в секрете.
#
# REMOTE_PRIVATE_KEY — приватная половина того ключа, которым ты уже входишь на Beget по SSH.
# При нестандартном порте SSH добавь ниже remote_port и секрет REMOTE_PORT.

name: Deploy to Beget

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-beget-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Validate deploy secrets (names must match exactly)
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
        run: |
          missing=0
          [ -z "$REMOTE_HOST" ] && echo "::error::Секрет REMOTE_HOST пустой или не создан" && missing=1
          [ -z "$REMOTE_USER" ] && echo "::error::Секрет REMOTE_USER пустой или не создан" && missing=1
          [ -z "$REMOTE_PATH" ] && echo "::error::Секрет REMOTE_PATH пустой или не создан" && missing=1
          [ -z "$REMOTE_PRIVATE_KEY" ] && echo "::error::Секрет REMOTE_PRIVATE_KEY пустой или не создан (имя именно такое)" && missing=1
          exit $missing

      # Ключ из секрета иногда приходит с CRLF (Windows) → libcrypto при чтении ключа.
      # Пишем ключ в файл, strip \r, проверяем ssh-keygen -y, затем rsync через ssh -i.
      - name: Rsync dist to Beget
        env:
          REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "$REMOTE_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          REMOTE_PATH_TRIM="$(printf '%s' "$REMOTE_PATH" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          SSH_BASE="${REMOTE_PATH_TRIM%/}"
          ssh $SSH_OPTS "${REMOTE_USER}@${REMOTE_HOST}" "test -d \"$SSH_BASE\"" || {
            echo "::error::Нет каталога REMOTE_PATH на сервере. Укажи в секретах полный путь к public_html из Beget (абсолютный, например /home/USER/.../public_html)."
            exit 1
          }
          rsync -avzr --delete --mkpath \
            -e "ssh $SSH_OPTS" \
            dist/ "${REMOTE_USER}@${REMOTE_HOST}:${SSH_BASE}/"
          rm -f ~/.ssh/deploy_key
